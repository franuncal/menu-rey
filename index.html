<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>El Rey de la Media Masa - Menú</title>
    <meta name="description" content="Menú de pizzas - El Rey de la Media Masa, Mercedes">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #fafafa;
            -webkit-font-smoothing: antialiased;
        }

        /* Contenedor de las imágenes */
        .menu-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
        }

        /* Cada imagen del menú */
        .menu-page {
            width: 100%;
            display: block;
            background: white;
        }

        /* Loading spinner */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
            background: white;
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f0f0f0;
            border-top-color: #B22234;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        .loading-text {
            color: #333;
            font-size: 14px;
            font-weight: 600;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Lazy loading: fade in cuando carga */
        .menu-page {
            opacity: 0;
            transition: opacity 0.4s ease-in;
        }

        .menu-page.loaded {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">Cargando menú...</div>
    </div>

    <div class="menu-container">
        <img src="pagina-1.jpg" alt="Menú - Página 1" class="menu-page" id="page1" loading="eager">
        <img src="pagina-2.jpg" alt="Menú - Página 2" class="menu-page" id="page2" loading="lazy">
        <img src="pagina-3.jpg" alt="Menú - Página 3" class="menu-page" id="page3" loading="lazy">
    </div>

    <script>
        // Fade in de imágenes cuando cargan
        const images = document.querySelectorAll('.menu-page');
        let loadedCount = 0;

        images.forEach(img => {
            if (img.complete) {
                img.classList.add('loaded');
                loadedCount++;
            } else {
                img.addEventListener('load', () => {
                    img.classList.add('loaded');
                    loadedCount++;
                    
                    // Ocultar loading cuando cargó la primera imagen
                    if (loadedCount >= 1) {
                        document.getElementById('loading').classList.add('hidden');
                    }
                });
            }
        });

        // Fallback: ocultar loading después de 2 segundos si no cargó nada
        setTimeout(() => {
            document.getElementById('loading').classList.add('hidden');
        }, 2000);
    </script>
</body>

</html>
