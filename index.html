<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Rey de la Media Masa - Menú</title>
    <meta name="description" content="Menú de pizzas - El Rey de la Media Masa, Mercedes">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --rojo-rey: #B22234;
            --crema: #F5EDDC;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f8f8;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* Contenedor del PDF - fullscreen */
        .pdf-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            animation: fadeIn 0.6s ease-out;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Loading spinner */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            animation: fadeOut 1s ease-out 1.5s forwards;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f0f0f0;
            border-top-color: var(--rojo-rey);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        .loading-text {
            color: var(--rojo-rey);
            font-size: 14px;
            font-weight: 600;
        }

        /* Animaciones */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Cargando menú...</div>
    </div>

    <div class="pdf-container">
        <!-- URL del PDF en Google Drive configurada para embed -->
        <iframe 
            src="https://drive.google.com/file/d/15DMo8HltkUcjIZu5LHtwUUgJry5R8pdO/preview" 
            allow="autoplay"
            loading="lazy">
        </iframe>
    </div>

    <script>
        // Remover loading cuando el iframe cargue
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.querySelector('.loading').style.display = 'none';
            }, 1200);
        });
    </script>
</body>

</html>
